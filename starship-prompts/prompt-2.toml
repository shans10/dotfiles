# Inserts a blank line between shell prompts
add_newline = true

# Change command timeout from 500 to 1000 ms
command_timeout = 1000

# Change the default prompt format
format = """\
[Ôò¡Ôò┤](238)$env_var\
$all[Ôò░ÔöÇ](238)$character"""
# 
# Change the default prompt characters
[character]
success_symbol = "[¾░üö](238)"
error_symbol = "[¾░üö](238)"

# Shows an icon that should be included by zshrc script based on the distribution or os
[env_var.STARSHIP_DISTRO]
format = '[$env_value](bold white) '
variable = "STARSHIP_DISTRO"
disabled = false

# Shows the username
[username]
style_user = "white bold"
style_root = "black bold"
format = "[$user]($style) "
disabled = false
show_always = true

[directory]
truncation_length = 3
truncation_symbol = "ÔÇª/"
home_symbol = "¾░ï× ~"
read_only_style = "197"
read_only = " ´Çú "
format = "at [$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = "¾░èó "
format = "on [$symbol$branch]($style) "
truncation_length = 4
truncation_symbol = "ÔÇª/"
style = "bold green"

[git_status]
format = '[\($all_status$ahead_behind\)]($style) '
style = "bold green"
conflicted = "­ƒÅ│"
up_to_date = "´üå "
untracked = "¾░Ç¬ "
ahead = "Ôçí${count}"
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
behind = "Ôçú${count}"
stashed = "¾░Åù "
modified = "´üä "
staged = '[++\($count\)](green)'
renamed = "¾░ûÀ "
deleted = "´Çö "

[terraform]
format = "via [´äÁ terraform $version]($style) ¾░æâ [$workspace]($style) "

[vagrant]
format = "via [´äÁ vagrant $version]($style) "

[docker_context]
format = "via [´îê $context](bold blue) "

[helm]
format = "via [´êÜ $version](bold purple) "

[python]
symbol = "¾░îá "
