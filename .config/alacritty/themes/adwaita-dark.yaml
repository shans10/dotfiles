colors:
  primary:
    background: "#1e1e1e" # base
    foreground: "#deddda" # text
    # Bright and dim foreground colors
    dim_foreground: "#c0bfbc" # text
    bright_foreground: "#fcfcfc" # text

  # Cursor colors
  cursor:
    text: "#1e1e1e" # base
    cursor: "#deddda" # rosewater

  # Selection colors
  selection:
    text: "#303030" # base
    background: "#c0bfbc" # rosewater

  # Normal colors
  normal:
    black: "#1e1e1e" # surface1
    red: "#ed333b" # red
    green: "#57e389" # green
    yellow: "#ff7800" # yellow
    blue: "#62a0ea" # blue
    magenta: "#9141ac" # pink
    cyan: "#5bc8af" # teal
    white: "#deddda" # subtext1

  # Bright colors
  bright:
    black: "#9a9996" # surface1
    red: "#ed333b" # red
    green: "#57e389" # green
    yellow: "#ff7800" # yellow
    blue: "#62a0ea" # blue
    magenta: "#9141ac" # pink
    cyan: "#5bc8af" # teal
    white: "#deddda" # subtext1

  # Dim colors
  dim:
    black: "#9a9996" # surface1
    red: "#f66151" # red
    green: "#8ff0a4" # green
    yellow: "#ffa348" # yellow
    blue: "#99c1f1" # blue
    magenta: "#dc8add" # pink
    cyan: "#93ddc2" # teal
    white: "#f6f5f4" # subtext1
