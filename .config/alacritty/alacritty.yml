import:
  # - ~/.config/alacritty/tokyo-night.yaml
  - ~/.config/alacritty/catppuccin/catppuccin-mocha.yml

shell:
  program: /usr/bin/fish

window:
  decorations: none

scrolling:
  history: 5000

font:
  normal:
    family: "JetBrainsMono Nerd Font"
    style: Medium

  bold:
    family: "JetBrainsMono Nerd Font"
    style: Bold

  italic:
    family: "JetBrainsMono Nerd Font"
    style: Italic

  bold_italic:
    family: "JetBrainsMono Nerd Font"
    style: Bold Italic

  size: 11.5

draw_bold_text_with_bright_colors: true

cursor:
  style:
    shape: Block
    blinking: Always
  blink_interval: 500

key_bindings:
  - { key: Return, mods: Shift, chars: "\x1b[13;2u" }
