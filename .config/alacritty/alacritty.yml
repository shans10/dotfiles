import:
  - ~/.config/alacritty/tokyo-night.yaml

shell:
  program: /usr/bin/fish

window:
  decorations: none

scrolling:
  history: 5000

# Font configuration
font:
  normal:
    family: CaskaydiaCove Nerd Font

  # Point size
  size: 12.0

draw_bold_text_with_bright_colors: true

cursor:
  style:
    shape: Block
    blinking: Always
  blink_interval: 500
