env:
  TERM: xterm-256color

shell:
  program: /usr/bin/fish

window:
  decorations: none

scrolling:
  history: 5000

# Font configuration
font:
  normal:
    family: CaskaydiaCove Nerd Font

  # Point size
  size: 11.0

draw_bold_text_with_bright_colors: true

# One Dark theme
colors:
  primary:
    background: '0x1e2127'
    foreground: '0xabb2bf'

    bright_foreground: '0xe6efff'

  # Cursor colors
  cursor:
    text: '0x000000'
    cursor: '0xcccccc'

  # Normal colors
  normal:
    black:   '0x1e2127'
    red:     '0xe06c75'
    green:   '0x98c379'
    yellow:  '0xd19a66'
    blue:    '0x61afef'
    magenta: '0xc678dd'
    cyan:    '0x56b6c2'
    white:   '0x828791'

  # Bright colors
  bright:
    black:   '0x5c6370'
    red:     '0xe06c75'
    green:   '0x98c379'
    yellow:  '0xd19a66'
    blue:    '0x61afef'
    magenta: '0xc678dd'
    cyan:    '0x56b6c2'
    white:   '0xe6efff'

  # Dim colors
  dim:
    black:   '0x1e2127'
    red:     '0xe06c75'
    green:   '0x98c379'
    yellow:  '0xd19a66'
    blue:    '0x61afef'
    magenta: '0xc678dd'
    cyan:    '0x56b6c2'
    white:   '0x828791'

cursor:
  style:
    shape: Block
    blinking: Always
  blink_interval: 500
